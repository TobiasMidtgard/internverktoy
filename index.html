<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Thansen Helper</title>
<style>
  :root{
    --bg:#0e1014; --panel:#171a21; --card:#1c1f27; --card-h:#222632;
    --line:#2a2f3a; --text:#eef1f6; --muted:#9aa3b2; --accent:#3b82f6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:radial-gradient(1200px 600px at 50% -10%,#1a2030 0%,var(--bg) 60%);
    color:var(--text);font:400 16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    min-height:100%;display:flex;flex-direction:column;
  }
  header{
    padding:26px 22px 10px;text-align:center;
  }
  .brand{font-weight:800;letter-spacing:.14em;font-size:20px;}
  .brand .dot{color:var(--accent);}
  .tag{color:var(--muted);font-size:14px;margin-top:4px;}
  main{flex:1;width:100%;max-width:920px;margin:0 auto;padding:24px 18px 60px;}
  .grid{
    display:grid;gap:16px;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  }
  .tool{
    display:flex;flex-direction:column;gap:8px;text-decoration:none;color:inherit;
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px;transition:transform .12s ease,background .12s ease,border-color .12s ease;
  }
  .tool:hover{transform:translateY(-2px);background:var(--card-h);border-color:#3a4250;}
  .tool .ico{font-size:34px;line-height:1;}
  .tool .name{font-weight:700;font-size:18px;}
  .tool .desc{color:var(--muted);font-size:14px;}
  .tool .go{margin-top:auto;color:var(--accent);font-size:13px;font-weight:600;}
  .tool.soon{opacity:.5;pointer-events:none;border-style:dashed;}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:18px;}
  @media(max-width:520px){
    .grid{grid-template-columns:1fr;}
    header{padding-top:20px;}
  }
</style>
</head>
<body>
<header>
  <div class="brand">THANSEN<span class="dot">·</span>HELPER</div>
  <div class="tag">Internal tools</div>
</header>

<main>
  <div class="grid">
    <a class="tool" href="bikes.html">
      <div class="ico">🚲</div>
      <div class="name">Velodex</div>
      <div class="desc">Bike showroom registry — searchable cards, specs, barcodes, spare parts.</div>
      <div class="go">Open →</div>
    </a>

    <a class="tool" href="tasks.html">
      <div class="ico">✅</div>
      <div class="name">Tasks</div>
      <div class="desc">Checklist with one-off and recurring items — daily, weekly, or custom.</div>
      <div class="go">Open →</div>
    </a>

    <div class="tool soon">
      <div class="ico">➕</div>
      <div class="name">More tools soon</div>
      <div class="desc">Room to grow as new helpers are added.</div>
      <div class="go">Coming soon</div>
    </div>
  </div>
</main>

<footer>Thansen Helper</footer>
</body>
</html>
