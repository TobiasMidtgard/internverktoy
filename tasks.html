<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#00529c">
<title>Oppgaver · Thansen Verktøykasse</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0f1318; --panel:#161b22; --card:#1b212a; --card-h:#222a35;
    --line:#2a323d; --text:#f1f4f8; --muted:#97a3b2;
    --primary:#2684e6; --primary-700:#00529c; --cta:#1aa64d; --yellow:#ffd400;
    --over:#e44b4b; --today:#ffb300; --soon:#39b6e6; --ok:#1aa64d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:radial-gradient(1100px 560px at 50% -8%,#13243a 0%,var(--bg) 58%);
    color:var(--text);font:400 16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh;}
  .topbar{height:4px;background:linear-gradient(90deg,var(--primary-700),var(--primary) 60%,var(--yellow));
    position:sticky;top:0;z-index:11;}
  header{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line);
    position:sticky;top:4px;background:rgba(15,19,24,.88);backdrop-filter:blur(8px);z-index:10;}
  .hub{color:var(--muted);text-decoration:none;font-weight:600;opacity:.85;}
  .hub:hover{opacity:1;color:var(--text);}
  .brand{font-weight:800;letter-spacing:.13em;}
  main{max-width:720px;margin:0 auto;padding:18px 16px 80px;}

  input,select,textarea,button{font:inherit;}
  textarea,input[type=text],input[type=date]{background:var(--panel);color:var(--text);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;}
  textarea{resize:vertical;width:100%;}
  input:focus,textarea:focus{outline:none;border-color:var(--primary);}
  .btn{background:var(--cta);color:#fff;border:0;border-radius:10px;padding:10px 18px;
    font-weight:700;font-size:15px;cursor:pointer;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text);}

  .add{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:18px;
    display:flex;flex-direction:column;gap:10px;}
  .add .title-in{width:100%;}
  .add .desc-in{min-height:46px;}
  .add .foot{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
  .due-wrap{display:flex;flex-direction:column;gap:4px;}
  .due-wrap label{color:var(--muted);font-size:12px;}
  .add .btn{margin-left:auto;}

  .recur{display:flex;flex-direction:column;gap:2px;}
  .recur .rlabel{color:var(--muted);font-size:12px;}
  .recur .rlabel b{color:var(--primary);}
  .recur input[type=range]{width:100%;accent-color:var(--primary);margin:2px 0 0;}
  .ticks{display:flex;justify-content:space-between;}
  .ticks span{font-size:11px;color:var(--muted);cursor:pointer;flex:1;text-align:center;user-select:none;}
  .ticks span:first-child{text-align:left;}
  .ticks span:last-child{text-align:right;}
  .ticks span.on{color:var(--primary);font-weight:700;}

  .banner{background:#3a2a14;border:1px solid #7c5a1e;color:#f6d18f;border-radius:12px;
    padding:12px 14px;font-size:14px;margin-bottom:16px;display:none;}
  .hint{color:var(--muted);font-size:12px;}

  .sec-h{color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin:18px 4px 8px;}
  ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
  .task{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;}
  .task.done .t-title{text-decoration:line-through;color:var(--muted);}
  .check{appearance:none;width:22px;height:22px;border:2px solid var(--line);border-radius:7px;cursor:pointer;
    flex:0 0 auto;margin-top:2px;position:relative;background:var(--panel);}
  .check:hover{border-color:var(--cta);}
  .check:checked{background:var(--ok);border-color:var(--ok);}
  .check:checked::after{content:"✓";position:absolute;inset:0;color:#06210f;font-size:14px;
    display:flex;align-items:center;justify-content:center;font-weight:800;}
  .t-main{flex:1;min-width:0;}
  .t-title{font-weight:600;word-break:break-word;}
  .t-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .chip{font-size:12px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);}
  .chip.recur{border-color:#1f3a5c;color:#9ecbff;}
  .chip.over{border-color:var(--over);color:#ffb4b4;}
  .chip.today{border-color:var(--today);color:#ffd591;}
  .chip.soon{border-color:var(--soon);color:#aee5ff;}
  .t-act{display:flex;gap:4px;flex:0 0 auto;}
  .icobtn{background:transparent;border:0;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:8px;}
  .icobtn:hover{background:var(--card-h);color:var(--text);}
  .empty{color:var(--muted);text-align:center;padding:36px 10px;}

  .t-desc{margin-top:8px;display:flex;flex-direction:column;gap:3px;}
  .md-chk{display:flex;align-items:flex-start;gap:8px;font-size:14px;cursor:pointer;color:var(--text);}
  .md-chk input{margin:3px 0 0;width:16px;height:16px;accent-color:var(--ok);cursor:pointer;flex:0 0 auto;}
  .md-chk.on span{text-decoration:line-through;color:var(--muted);}
  .md-li{font-size:14px;color:var(--text);}
  .md-li::before{content:"•";color:var(--muted);margin-right:6px;}
  .md-h{font-weight:700;font-size:14px;margin-top:4px;}
  .md-p{font-size:14px;color:var(--muted);word-break:break-word;}
  .md-sp{height:6px;}
  code{background:#0c1422;padding:0 4px;border-radius:4px;font-size:12px;}

  .modal{position:fixed;inset:0;background:rgba(6,9,13,.62);display:none;align-items:center;justify-content:center;
    z-index:50;padding:16px;}
  .modal.show{display:flex;}
  .sheet{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--primary);
    border-radius:18px;padding:18px;width:100%;max-width:460px;max-height:90vh;overflow:auto;}
  .sheet h3{margin:0 0 14px;}
  .sheet .row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .sheet label{color:var(--muted);font-size:13px;}
  .sheet .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
  @media(max-width:520px){ .add .btn{margin-left:0;width:100%;} }
</style>
</head>
<body>
<div class="topbar"></div>
<header>
  <a class="hub" href="index.html">‹ Hjem</a>
  <span class="brand">OPPGAVER</span>
</header>

<main>
  <div class="banner" id="banner"></div>

  <div class="add">
    <input type="text" class="title-in" id="addTitle" placeholder="Legg til oppgave…" autocomplete="off">
    <textarea class="desc-in" id="addDesc" placeholder="Beskrivelse (valgfritt) — bruk «- [ ] punkt» for avkrysning, «- » for kulepunkt, **fet**"></textarea>
    <div class="recur">
      <span class="rlabel">Gjentas: <b id="addRlabel">Aldri</b></span>
      <input type="range" id="addSlider" min="0" max="4" step="1" value="0">
      <div class="ticks" id="addTicks">
        <span data-v="0">Aldri</span><span data-v="1">Månedlig</span><span data-v="2">Ukentlig</span><span data-v="3">Daglig</span><span data-v="4">Hver time</span>
      </div>
    </div>
    <div class="foot">
      <div class="due-wrap" id="addDueWrap">
        <label id="addDueLbl">Forfaller (valgfritt)</label>
        <input type="date" id="addDue">
      </div>
      <button class="btn" id="addBtn">Legg til</button>
    </div>
  </div>

  <div id="list"></div>
</main>

<div class="modal" id="editModal">
  <div class="sheet">
    <h3>Rediger oppgave</h3>
    <div class="row"><label>Tittel</label><input type="text" id="edTitle"></div>
    <div class="row">
      <label>Beskrivelse</label>
      <textarea id="edDesc" style="min-height:90px"></textarea>
      <span class="hint">«- [ ] punkt» = avkrysning · «- » = kulepunkt · «# » = overskrift · **fet**</span>
    </div>
    <div class="row">
      <label>Gjentas: <b id="edRlabel">Aldri</b></label>
      <input type="range" id="edSlider" min="0" max="4" step="1" value="0">
      <div class="ticks" id="edTicks">
        <span data-v="0">Aldri</span><span data-v="1">Månedlig</span><span data-v="2">Ukentlig</span><span data-v="3">Daglig</span><span data-v="4">Hver time</span>
      </div>
    </div>
    <div class="row" id="edDueRow"><label>Forfallsdato</label><input type="date" id="edDue"></div>
    <div class="actions">
      <button class="btn ghost" id="edCancel">Avbryt</button>
      <button class="btn" id="edSave">Lagre</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const T = window.THelper;
const $ = id => document.getElementById(id);
const LOC = 'nb-NO';
let tasks = [], editId = null;

const RECUR       = ['none','month','week','day','hour'];
const RECUR_LABEL = ['Aldri','Månedlig','Ukentlig','Daglig','Hver time'];
const idxToUnit = i => RECUR[i] || 'none';
const unitToIdx = u => { const i = RECUR.indexOf(u); return i < 0 ? 0 : i; };
const recurChip = u => u==='hour'?'Hver time':u==='day'?'Daglig':u==='week'?'Ukentlig':u==='month'?'Månedlig':'Engang';

/* ---------- datoer ---------- */
function dueChip(dueAt){
  if(!dueAt) return null;
  const ms = new Date(dueAt) - new Date();
  const hrs = ms/3600000;
  if(ms < 0){
    const a = Math.abs(hrs);
    return a < 24 ? {txt:`Forfalt ${Math.max(1,Math.round(a))}t`, cls:'over'}
                  : {txt:`Forfalt ${Math.round(a/24)}d`, cls:'over'};
  }
  if(hrs < 1)  return {txt:`Om ${Math.max(1,Math.round(hrs*60))} min`, cls:'today'};
  if(hrs < 24) return {txt:`Om ${Math.round(hrs)}t`, cls:'today'};
  const days = Math.round(hrs/24);
  if(days === 1) return {txt:'I morgen', cls:'soon'};
  if(days <= 7)  return {txt:`Om ${days}d`, cls:'soon'};
  return {txt:new Date(dueAt).toLocaleDateString(LOC,{day:'numeric',month:'short'}), cls:''};
}
const pad = n => String(n).padStart(2,'0');
function dateToInput(dt){ const d=new Date(dt); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function inputDateToISO(v){ return v ? new Date(v+'T00:00').toISOString() : null; }
function todayMidnightISO(){ const d=new Date(); d.setHours(0,0,0,0); return d.toISOString(); }

/* ---------- markdown (trygt: escape først) ---------- */
function mdInline(s){
  s = T.esc(s);
  s = s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  s = s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<i>$2</i>');
  s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
  return s;
}
function mdToHtml(src){
  if(!src) return '';
  let ci=-1; const out=[];
  for(const raw of src.split('\n')){
    const line = raw.replace(/\s+$/,'');
    let m;
    if(m = line.match(/^\s*[-*]\s+\[([ xX])\]\s+(.*)$/)){
      ci++; const on = m[1].toLowerCase()==='x';
      out.push(`<label class="md-chk ${on?'on':''}"><input type="checkbox" data-ci="${ci}" ${on?'checked':''}><span>${mdInline(m[2])}</span></label>`);
    } else if(m = line.match(/^\s*[-*]\s+(.*)$/)){
      out.push(`<div class="md-li">${mdInline(m[1])}</div>`);
    } else if(m = line.match(/^#{1,3}\s+(.*)$/)){
      out.push(`<div class="md-h">${mdInline(m[1])}</div>`);
    } else if(line.trim()===''){
      out.push('<div class="md-sp"></div>');
    } else {
      out.push(`<div class="md-p">${mdInline(line)}</div>`);
    }
  }
  return out.join('');
}
function toggleCheckbox(src, ci){
  let i = -1;
  return src.split('\n').map(line=>{
    const m = line.match(/^(\s*[-*]\s+\[)([ xX])(\]\s+.*)$/);
    if(m){ i++; if(i === ci){ const on = m[2].toLowerCase()==='x'; return m[1]+(on?' ':'x')+m[3]; } }
    return line;
  }).join('\n');
}

/* ---------- glidebryter ---------- */
function setSlider(sliderId, ticksId, labelId, idx, onChange){
  const s = $(sliderId), ticks = $(ticksId), lbl = $(labelId);
  s.value = idx;
  const paint = () => {
    const v = +s.value;
    lbl.textContent = RECUR_LABEL[v];
    [...ticks.children].forEach(c => c.classList.toggle('on', +c.dataset.v === v));
    onChange && onChange(v);
  };
  s.oninput = paint;
  ticks.onclick = e => { const sp = e.target.closest('span'); if(!sp) return; s.value = sp.dataset.v; paint(); };
  paint();
}

/* ---------- visning ---------- */
function render(){
  const box = $('list');
  if(!tasks.length){ box.innerHTML = '<div class="empty">Ingen oppgaver ennå — legg til en over.</div>'; return; }
  const open = tasks.filter(t=>!t.done).sort((a,b)=>{
    if(!a.due_at) return 1; if(!b.due_at) return -1;
    return new Date(a.due_at) - new Date(b.due_at);
  });
  const done = tasks.filter(t=>t.done);
  let html = '<ul>'+open.map(row).join('')+'</ul>';
  if(done.length) html += `<div class="sec-h">Fullført (${done.length})</div><ul>`+done.map(row).join('')+'</ul>';
  box.innerHTML = html;
}
function row(t){
  const e = T.esc, meta = [];
  meta.push(`<span class="chip recur">${e(recurChip(t.recur_unit))}</span>`);
  if(!t.done){ const c = dueChip(t.due_at); if(c) meta.push(`<span class="chip ${c.cls}">${e(c.txt)}</span>`); }
  return `<li class="task ${t.done?'done':''}" data-id="${e(t.id)}">
    <input type="checkbox" class="check" data-act="check" ${t.done?'checked':''}>
    <div class="t-main">
      <div class="t-title">${e(t.title)}</div>
      ${t.notes ? `<div class="t-desc">${mdToHtml(t.notes)}</div>` : ''}
      <div class="t-meta">${meta.join('')}</div>
    </div>
    <div class="t-act">
      <button class="icobtn" data-act="edit" title="Rediger">✎</button>
      <button class="icobtn" data-act="del" title="Slett">🗑</button>
    </div>
  </li>`;
}

/* ---------- data ---------- */
async function load(){
  if(!T.sb){ showBanner('Kunne ikke laste Supabase-biblioteket.'); return; }
  const {data,error} = await T.sb.from('tasks').select('*');
  if(error){
    if(/relation|does not exist|schema cache|column/i.test(error.message||''))
      showBanner('Oppgave-backend mangler migreringen (tasks.sql + tasks_v2.sql). Kjør dem og last inn på nytt.');
    else showBanner('Lastefeil: '+error.message);
    tasks=[]; render(); return;
  }
  hideBanner(); tasks = data || []; render();
}
const showBanner = m => { const b=$('banner'); b.textContent=m; b.style.display='block'; };
const hideBanner = () => { $('banner').style.display='none'; };

async function addTask(){
  const title = $('addTitle').value.trim();
  if(!title) return;
  const unit = idxToUnit(+$('addSlider').value);
  let due_at;
  if(unit === 'hour')        due_at = new Date().toISOString();
  else if($('addDue').value) due_at = inputDateToISO($('addDue').value);
  else if(unit !== 'none')   due_at = todayMidnightISO();
  else                       due_at = null;
  const task = { title, notes: $('addDesc').value.trim() || null, recur_unit: unit, recur_n: 1, due_at, done: false };
  try{
    await T.rpc('add_task', {p_task: task});
    $('addTitle').value=''; $('addDesc').value=''; $('addDue').value='';
    setSlider('addSlider','addTicks','addRlabel',0,addDueVis);
    await load();
  }catch(e){ if(e.message!=='no-pass') T.toast('Kunne ikke legge til: '+e.message); }
}

async function toggle(t){
  try{
    if(t.done){ await T.rpc('update_task',{p_id:t.id, p_task:{done:false}}); }
    else{
      const res = await T.rpc('complete_task',{p_id:t.id});
      const nt = Array.isArray(res) ? res[0] : res;
      if(nt && nt.recur_unit && nt.recur_unit!=='none' && nt.due_at){
        const d = new Date(nt.due_at);
        const when = nt.recur_unit==='hour'
          ? 'kl. '+d.toLocaleTimeString(LOC,{hour:'2-digit',minute:'2-digit'})
          : d.toLocaleDateString(LOC,{day:'numeric',month:'short'});
        T.toast('Flyttet til → '+when);
      }
    }
    await load();
  }catch(e){ if(e.message!=='no-pass') T.toast('Feil: '+e.message); load(); }
}

async function toggleDescCheck(t, ci){
  const next = toggleCheckbox(t.notes||'', ci);
  try{ await T.rpc('update_task',{p_id:t.id, p_task:{notes:next}}); await load(); }
  catch(e){ if(e.message!=='no-pass') T.toast('Feil: '+e.message); load(); }
}

async function del(t){
  if(!confirm('Slette «'+t.title+'»?')) return;
  try{ await T.rpc('delete_task',{p_id:t.id}); await load(); }
  catch(e){ if(e.message!=='no-pass') T.toast('Kunne ikke slette: '+e.message); }
}

/* ---------- redigeringsmodal ---------- */
function openEdit(t){
  editId = t.id;
  $('edTitle').value = t.title || '';
  $('edDesc').value  = t.notes || '';
  setSlider('edSlider','edTicks','edRlabel', unitToIdx(t.recur_unit), v => {
    $('edDueRow').style.display = idxToUnit(v)==='hour' ? 'none' : '';
  });
  $('edDue').value = t.due_at ? dateToInput(t.due_at) : '';
  $('editModal').classList.add('show');
}
function closeEdit(){ $('editModal').classList.remove('show'); editId=null; }
async function saveEdit(){
  const t = tasks.find(x=>x.id===editId); if(!t) return;
  const unit = idxToUnit(+$('edSlider').value);
  let due_at;
  if(unit === 'hour') due_at = t.due_at || new Date().toISOString();
  else                due_at = $('edDue').value ? inputDateToISO($('edDue').value) : null;
  const patch = {
    title: $('edTitle').value.trim() || t.title,
    notes: $('edDesc').value.trim() || null,
    recur_unit: unit, recur_n: 1, due_at
  };
  try{ await T.rpc('update_task',{p_id:editId, p_task:patch}); closeEdit(); await load(); }
  catch(e){ if(e.message!=='no-pass') T.toast('Kunne ikke lagre: '+e.message); }
}

/* ---------- hendelser ---------- */
function addDueVis(v){
  const u = idxToUnit(v);
  $('addDueWrap').style.display = u==='hour' ? 'none' : '';
  $('addDueLbl').textContent = u==='none' ? 'Forfaller (valgfritt)' : 'Startdato';
}
$('addBtn').addEventListener('click', addTask);
$('addTitle').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });
$('list').addEventListener('click', e=>{
  const li = e.target.closest('.task'); if(!li) return;
  const t = tasks.find(x=>x.id===li.dataset.id); if(!t) return;
  const cb = e.target.closest('.md-chk input[data-ci]');
  if(cb){ e.stopPropagation(); toggleDescCheck(t, +cb.dataset.ci); return; }
  const act = e.target.dataset.act;
  if(act==='check') toggle(t);
  else if(act==='edit') openEdit(t);
  else if(act==='del') del(t);
});
$('edCancel').addEventListener('click', closeEdit);
$('edSave').addEventListener('click', saveEdit);
$('editModal').addEventListener('click', e=>{ if(e.target.id==='editModal') closeEdit(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeEdit(); });

/* ---------- oppstart ---------- */
setSlider('addSlider','addTicks','addRlabel',0,addDueVis);
load();
if(T.sb){
  T.sb.channel('tasks-rt').on('postgres_changes',{event:'*',schema:'public',table:'tasks'}, load).subscribe();
}
</script>
</body>
</html>
