name: Backup database
on:
  schedule:
    - cron: '30 3 * * *'   # daglig 03:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      # Supabase kjører PostgreSQL 17 — pg_dump må matche major-versjonen
      - name: Install postgresql-client-17
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      # Krypteres fordi artifakter i et offentlig repo kan lastes ned av alle
      # innloggede GitHub-brukere. Dekryptering: se db/README.md.
      - name: Dump and encrypt
        env:
          PGHOST: ${{ secrets.DB_PGHOST }}
          PGPORT: ${{ secrets.DB_PGPORT }}
          PGUSER: ${{ secrets.DB_PGUSER }}
          PGPASSWORD: ${{ secrets.DB_PGPASSWORD }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump -d postgres --schema=public --no-owner --no-privileges -Fc -f dump.pgdump
          openssl enc -aes-256-cbc -pbkdf2 -salt -in dump.pgdump -out "backup-$(date -u +%Y-%m-%d).pgdump.enc" -pass env:BACKUP_PASSPHRASE
          rm dump.pgdump
          ls -lh *.pgdump.enc

      - uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: '*.pgdump.enc'
          retention-days: 30

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "DB-backup feilet $(date -u +%F)" \
            --body "Nattlig databasebackup feilet. Se kjøringen: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
